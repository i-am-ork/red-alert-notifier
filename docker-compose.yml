services:
  app:
    build: .
    ports:
      - "5000:5000"
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http app:5000
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - app
    restart: unless-stopped
